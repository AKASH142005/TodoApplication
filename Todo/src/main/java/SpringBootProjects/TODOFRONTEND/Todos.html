<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width =device-width initial-scale =1.0">
        <title>Todos </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h2>Your Todos</h2>
            <div class="todo-cards" id="todo-list">
                <p id="empty-message">Loading your todos...</p>
            </div>
            <div class="add-todo">
                <input type="text" id="new-todo" placeholder="Add new todo" />
                <button onclick="addTodo()">Add</button>
            </div>
        </div>
        <script src ="script.js" ></script>
    </body>
</html>
